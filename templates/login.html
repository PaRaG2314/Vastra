{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Login</h2>

        {% if messages %}

            {% for message in messages %}

                <div class="error-message">
                    {{ message }}
                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p class="auth-link">
            New user?
            <a href="{% url 'register' %}">
                Register here
            </a>
        </p>

    </div>

</div>

{% endblock %}
